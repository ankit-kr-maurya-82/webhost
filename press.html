<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Press - Reddit</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f9ff;
        color: #0b2f6b;
      }
      h1,
      h2,
      h3 {
        color: #0b2f6b;
        margin-top: 0;
      }
      a {
        color: #1f4e99;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      hr {
        border: 0;
        border-top: 1px solid #b7cdfa;
      }
      input,
      button {
        border: 1px solid #8fb0ea;
        border-radius: 4px;
        padding: 7px 9px;
      }
      input {
        background: #ffffff;
        color: #0b2f6b;
      }
      button {
        background: #1f4e99;
        color: #ffffff;
        cursor: pointer;
      }
      button:hover {
        background: #173f82;
      }
      table img {
        border-radius: 6px;
        border: 2px solid #bcd2fb;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Where stories are born</h1>
      <p>
        Reddit creates and catalyzes culture — a single comment can spark a
        global movement.
      </p>
      <a href="#press_requests"></a>
    </div>
  </body>
</html>
