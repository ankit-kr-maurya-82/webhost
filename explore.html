<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore | BlueImg</title>
  <link rel="stylesheet" href="css/explore.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <header class="explore-top">
    <div class="logo"><i class="fa-solid fa-compass"></i> Explore</div>
    <div class="search">
      <input type="text" placeholder="Search photos, people, styles" aria-label="Search photos, people, styles" />
    </div>
    <button class="upload" type="button"><i class="fa-solid fa-arrow-up-from-bracket"></i> Upload</button>
  </header>

  <main class="container">
    <section class="chips" aria-label="Trending topics">
      <button class="chip active" type="button"><i class="fa-solid fa-star"></i> All</button>
      <button class="chip" type="button"><i class="fa-solid fa-leaf"></i> Nature</button>
      <button class="chip" type="button"><i class="fa-solid fa-couch"></i> Interiors</button>
      <button class="chip" type="button"><i class="fa-solid fa-utensils"></i> Food</button>
      <button class="chip" type="button"><i class="fa-solid fa-plane"></i> Travel</button>
      <button class="chip" type="button"><i class="fa-solid fa-city"></i> Street</button>
      <button class="chip" type="button"><i class="fa-solid fa-building-columns"></i> Architecture</button>
    </section>

    <section class="feed" aria-label="Visual feed">
      <article class="card">
        <img src="https://picsum.photos/seed/u1/700/920" alt="Mountain valley" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Morning Valley</h2><p>by Lucas North</p></div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/seed/u2/700/760" alt="Minimal interior" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Soft Interior</h2><p>by Ana Loft</p></div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/seed/u3/700/980" alt="City street" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Night Street</h2><p>by Kai Mill</p></div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/seed/u4/700/840" alt="Coffee and notebook" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Cafe Journal</h2><p>by Mira Chen</p></div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/seed/u5/700/1050" alt="Coastal road" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Coastal Route</h2><p>by Ron Field</p></div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/seed/u6/700/800" alt="Food plate" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Brunch Mood</h2><p>by Sara Bell</p></div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/seed/u7/700/970" alt="Workspace desk" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Workspace Light</h2><p>by Dev Hart</p></div>
      </article>

      <article class="card">
        <img src="https://picsum.photos/seed/u8/700/900" alt="Forest trail" />
        <button class="save" type="button"><i class="fa-solid fa-bookmark"></i> Save</button>
        <div class="meta"><h2>Forest Walk</h2><p>by Tia Snow</p></div>
      </article>
    </section>
  </main>
   <script>
        document.addEventListener("copy", function (event) {
            event.preventDefault();
            event.clipboardData.setData("text/plain", "you are user");
        });
    </script>
</body>
</html>
