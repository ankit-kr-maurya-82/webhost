<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>imageweb - Log in</title>
    <style>
      body {
        margin: 0;
        padding: 14px;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f9ff;
        color: #0b2f6b;
      }
      h1,
      h2,
      h3 {
        color: #0b2f6b;
        margin-top: 0;
      }
      a {
        color: #1f4e99;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      hr {
        border: 0;
        border-top: 1px solid #b7cdfa;
      }
      input,
      button {
        border: 1px solid #8fb0ea;
        border-radius: 4px;
        padding: 7px 9px;
      }
      input {
        background: #ffffff;
        color: #0b2f6b;
      }
      button {
        background: #1f4e99;
        color: #ffffff;
        cursor: pointer;
      }
      button:hover {
        background: #173f82;
      }
      table img {
        border-radius: 6px;
        border: 2px solid #bcd2fb;
      }
    </style>
  </head>
  <body>
    <h1>Log in</h1>
    <p>Access your imageweb account.</p>

    <form action="#" method="post">
      <label for="email">Email</label><br />
      <input type="email" id="email" name="email" required /><br /><br />

      <label for="password">Password</label><br />
      <input
        type="password"
        id="password"
        name="password"
        required
      /><br /><br />

      <button type="submit">Log in</button>
    </form>

    <p><a href="#">Forgot password?</a></p>
  </body>
</html>
