<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | BlueImg</title>
  <link rel="stylesheet" href="css/contact.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="js/contact.js" defer></script>
</head>
<body>
  <main class="contact-page">
    <section class="intro">
      <p class="tag"><i class="fa-solid fa-envelope"></i> Contact Us</p>
      <h1>Let�s connect about your next idea.</h1>
      <p>Have a suggestion, project request, or feedback? Send us a message and we will get back to you soon.</p>

      <div class="info-list">
        <p><i class="fa-solid fa-location-dot"></i> BlueImg Studio, Mumbai</p>
        <p><i class="fa-solid fa-phone"></i> +91 XXXXX XXXXX</p>
        <p><i class="fa-solid fa-paper-plane"></i> hello@blueimg.dev</p>
      </div>
    </section>

    <section class="form-wrap">
      <h2><i class="fa-solid fa-comment-dots"></i> Send Message</h2>
      <form id="contact-form" novalidate>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text" placeholder="Subject" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>

        <button type="submit"><i class="fa-solid fa-paper-plane"></i> Submit</button>
        <p id="contact-status" class="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
   <script>
        document.addEventListener("copy", function (event) {
            event.preventDefault();
            event.clipboardData.setData("text/plain", "you are user");
        });
    </script>
</body>
</html>
